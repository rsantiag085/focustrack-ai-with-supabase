services:
  backend:
    image: rsantiag085/focustrack-ai-with-supabase:v1.2.0
    container_name: focustrack_backend
    expose:
      - "8000"
    env_file:
      - .env
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: focustrack_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
